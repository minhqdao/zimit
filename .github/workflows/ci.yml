name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: mlugg/setup-zig@v2
              with:
                  version: "0.16.0"
            - run: zig fmt --check src/ build.zig

    test:
        name: ${{ matrix.os }} - ${{ matrix.zig-version }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                zig-version: ["0.16.0"]
        steps:
            - uses: actions/checkout@v6
            - uses: mlugg/setup-zig@v2
              with:
                  version: ${{ matrix.zig-version }}
            - run: zig build test --summary all
            - run: zig build docs # just verifying they build
